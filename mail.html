<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>114.ae跨境 - 临时邮箱 阅后即焚</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #f0f8ff; --card-bg: #ffffff; --text-primary: #1e293b;
            --text-secondary: #5b6e8c; --border-color: #e0f0ff; --accent-color: #00b4ff;
        }
        body.dark {
            --bg-color: #0a1628; --card-bg: #1e293b; --text-primary: #f1f5f9;
            --text-secondary: #94a3b8; --border-color: #334155; --accent-color: #00d4ff;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: background 0.6s ease;
        }

        /* 跑马灯 */
        .marquee {
            background: linear-gradient(to right, #ff00aa, #00ffff);
            color: #000;
            padding: 10px 0;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 200;
        }
        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 18s linear infinite;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* 版权联系 - 紧挨跑马灯下方 */
        .copyright-bar {
            background: rgba(10, 22, 40, 0.95);
            color: #fff;
            padding: 8px 0;
            font-size: 0.95rem;
            text-align: center;
            position: fixed;
            top: 44px;
            left: 0;
            width: 100%;
            z-index: 199;
            border-bottom: 1px solid #00d4ff;
        }

        .petals-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
        .petal { position: absolute; top: -30px; width: 7px; height: 10px; background: linear-gradient(135deg, #ff9ede, #c084fc, #a5b4fc, #67e8f9); border-radius: 40% 0 50% 20%; opacity: 0.55; animation: fall linear infinite; box-shadow: 0 0 4px rgba(255,158,222,0.4); }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg) translateX(0); } 100% { transform: translateY(110vh) rotate(520deg) translateX(25px); } }
        .petal.tiny { width: 4px; height: 7px; }
        .petal.slow { animation-duration: 24s; }
        .petal.medium { animation-duration: 17s; }
        .petal.fast { animation-duration: 12s; }

        .container { max-width: 860px; margin: 120px auto 140px; padding: 0 18px; }
        .search-header {
            background: var(--card-bg);
            border-radius: 36px;
            padding: 38px 28px 32px;
            margin-bottom: 28px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 12px 45px rgba(0,180,255,0.18);
        }
        .avatar {
            width: 128px; height: 128px; border-radius: 50%; margin: 0 auto 20px;
            border: 6px solid rgba(0,180,255,0.65); box-shadow: 0 0 40px rgba(0,240,255,0.45);
            font-size: 4.8rem; display: flex; align-items: center; justify-content: center;
            background: #1e293b; color: #00ff9d;
        }
        .mail-display {
            background: rgba(0,180,255,0.08); padding: 20px 28px; border-radius: 24px;
            font-family: 'SF Mono', Consolas, monospace; font-size: 1.2rem; font-weight: 600;
            margin: 22px 0 24px; border: 2px solid var(--accent-color); color: var(--text-primary);
            min-height: 72px; display: flex; align-items: center; justify-content: center;
            word-break: break-all; text-align: center; box-shadow: 0 0 25px rgba(0,180,255,0.3);
        }
        .mail-display.copied { background: rgba(0,240,150,0.15); border-color: #00ffaa; box-shadow: 0 0 30px rgba(0,255,170,0.5); }

        .service-selector { margin: 15px 0 20px; text-align: center; }
        .service-selector select {
            padding: 10px 18px; border-radius: 50px; border: 2px solid var(--accent-color);
            background: var(--card-bg); color: var(--text-primary); font-size: 0.96rem;
        }
        .btn-group { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 13px 26px; border-radius: 60px; border: none; font-weight: 600;
            cursor: pointer; font-size: 0.95rem; min-width: 128px;
        }
        .btn-p { background: linear-gradient(135deg, var(--accent-color), #00f0ff); color: white; }
        .btn-s { background: #e0f0ff; color: #1e293b; }

        .refresh-inbox-btn {
            position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, var(--accent-color), #00f0ff); color: white;
            border: none; padding: 12px 32px; border-radius: 50px; font-size: 1rem;
            font-weight: 600; box-shadow: 0 8px 25px rgba(0,180,255,0.4); cursor: pointer;
            z-index: 99; transition: all 0.3s;
        }
        .refresh-inbox-btn:hover { transform: translateX(-50%) translateY(-3px); }

        .results-container {
            background: var(--card-bg); border-radius: 32px; padding: 26px 24px;
            border: 1px solid var(--border-color); box-shadow: 0 10px 38px rgba(0,180,255,0.12);
        }
        .mail-item {
            background: rgba(0,180,255,0.08); padding: 14px; margin: 10px 0;
            border-radius: 16px; border-left: 5px solid var(--accent-color); cursor: pointer;
        }
        .theme-toggle { 
            position: fixed; top: 25px; right: 25px; width: 48px; height: 48px; 
            border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); 
            display: flex; align-items: center; justify-content: center; font-size: 22px; 
            cursor: pointer; z-index: 201; 
        }
        .music-toggle { 
            position: fixed; bottom: 28px; right: 28px; width: 64px; height: 64px; 
            border-radius: 50%; background: var(--card-bg); border: 2.5px solid var(--accent-color); 
            font-size: 35px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 32px rgba(0,180,255,0.4); cursor: pointer; z-index: 200; 
        }
        .music-toggle.playing { animation: rotate 2.7s linear infinite; color: #00f0ff; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- 跑马灯广告 -->
    <div class="marquee">
        <span>🚀 114.ae跨境临时邮箱上线！隐私保护 · 阅后即焚 · 支持验证码 · 防骚扰 · 欢迎使用 · 广告位招商请联系 TG</span>
    </div>

    <!-- 版权联系（紧挨跑马灯下方） -->
    <div class="copyright-bar">
        © 114.ae跨境临时邮箱 | TG: @your_tg | WhatsApp: +65 你的号码
    </div>

    <div class="petals-container" id="petals"></div>
    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="container">
        <div class="search-header">
            <div class="avatar">🛸</div>
            <h1 style="font-size: 2.4rem; margin-bottom: 8px;">114.ae跨境</h1>
            <p style="color: var(--text-secondary); font-size: 1.15rem; margin-bottom: 20px;">114.ae临时邮箱 阅后即焚</p>

            <!-- 四服务切换 -->
            <div class="service-selector">
                <select id="serviceSelect">
                    <option value="1secmail">1SecMail（推荐快速）</option>
                    <option value="mailtm">Mail.tm（推荐稳定）</option>
                    <option value="tempmail">Temp-Mail.org（推荐高收件率）</option>
                    <option value="guerrilla">Guerrilla Mail（老牌稳定）</option>
                </select>
            </div>

            <div id="addr" class="mail-display">点击“更换地址”生成随机邮箱...</div>
            <div class="btn-group">
                <button onclick="copyMail()" class="btn btn-s">📋 复制地址</button>
                <button onclick="generateNewMail()" class="btn btn-p">🔄 更换地址</button>
            </div>
        </div>

        <div class="results-container">
            <div style="color: var(--text-secondary); margin-bottom: 15px; font-size: 0.95rem;">📥 实时收件箱</div>
            <div id="list" style="min-height: 280px; text-align: center; color: var(--text-secondary);">等待新邮件推送中...</div>
        </div>
    </div>

    <button onclick="manualRefresh()" class="refresh-inbox-btn">📥 刷新收件箱</button>
    <div class="music-toggle" id="musicToggle">♪</div>
    <audio id="bgm" loop preload="auto" src="https://files.catbox.moe/0oluxu.flac"></audio>

    <script>
        let currentService = "1secmail";
        let currentEmail = "";
        let sid = null;
        let proxy = "https://corsproxy.io/?";   // 默认打开CORS代理

        const addrEl = document.getElementById('addr');
        const listEl = document.getElementById('list');
        const serviceSelect = document.getElementById('serviceSelect');

        serviceSelect.addEventListener('change', () => {
            currentService = serviceSelect.value;
            generateNewMail();
        });

        async function fetchAPI(url) {
            const fullUrl = proxy + encodeURIComponent(url);
            try {
                const res = await fetch(fullUrl, {
                    headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
                });
                if (!res.ok) throw new Error('请求失败');
                return await res.json();
            } catch(e) {
                console.error(e);
                listEl.innerHTML = `<div style="color:red;">拉取失败（跨域问题），请稍后重试</div>`;
                return null;
            }
        }

        async function generateNewMail() {
            addrEl.textContent = "生成随机邮箱中...";
            listEl.innerHTML = `<div style="padding:40px;color:var(--text-secondary);">正在生成新邮箱...</div>`;
            sid = null;

            try {
                if (currentService === "guerrilla") {
                    const data = await fetchAPI("https://api.guerrillamail.com/ajax.php?f=get_email_address");
                    currentEmail = data.email_addr;
                    sid = data.sid_token || data.session_id;
                } else if (currentService === "1secmail") {
                    const data = await fetchAPI("https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1");
                    currentEmail = data[0];
                } else if (currentService === "mailtm") {
                    const domains = await fetchAPI("https://api.mail.tm/domains");
                    const domain = domains['hydra:member'][0].domain;
                    currentEmail = "user" + Math.floor(Math.random() * 99999) + "@" + domain;
                } else { // tempmail
                    const data = await fetchAPI("https://api.temp-mail.org/request/domains/format/json");
                    const domain = data[0];
                    currentEmail = "user" + Math.floor(Math.random() * 99999) + "@" + domain;
                }
                addrEl.textContent = currentEmail || "生成失败";
            } catch (e) {
                addrEl.textContent = "生成失败，请重试";
            }
        }

        async function refreshInbox() {
            if (!currentEmail) return;
            listEl.innerHTML = `<div style="padding:40px;color:var(--text-secondary);">正在检查新邮件...</div>`;

            try {
                let mails = [];
                if (currentService === "1secmail") {
                    const login = currentEmail.split('@')[0];
                    const domain = currentEmail.split('@')[1];
                    const data = await fetchAPI(`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`);
                    mails = data || [];
                } else if (currentService === "guerrilla" && sid) {
                    const data = await fetchAPI(`https://api.guerrillamail.com/ajax.php?f=get_email_list&offset=0&sid_token=${sid}`);
                    mails = data.list || [];
                } else if (currentService === "mailtm") {
                    const data = await fetchAPI(`https://api.mail.tm/messages`);
                    mails = data['hydra:member'] || [];
                } else {
                    mails = [];
                }

                if (mails.length === 0) {
                    listEl.innerHTML = `<div style="padding:40px;color:var(--text-secondary);">暂无新邮件...</div>`;
                    return;
                }

                let html = '';
                mails.forEach(mail => {
                    const from = mail.from || mail.from_email || '未知';
                    const subject = mail.subject || '无主题';
                    const id = mail.id || mail.mail_id;
                    html += `
                        <div class="mail-item" onclick="viewMail('${id}')">
                            <strong>📧 ${from}</strong><br>
                            <strong>主题：</strong>${subject}<br>
                            <small>${mail.date || ''}</small>
                        </div>`;
                });
                listEl.innerHTML = html;
            } catch(e) {
                listEl.innerHTML = `<div style="color:red;">拉取邮件失败，请刷新重试</div>`;
            }
        }

        async function viewMail(id) {
            if (!currentEmail || !id) return alert("无法查看该邮件");
            try {
                let content = "加载中...";
                if (currentService === "1secmail") {
                    const login = currentEmail.split('@')[0];
                    const domain = currentEmail.split('@')[1];
                    const data = await fetchAPI(`https://www.1secmail.com/api/v1/?action=readMessage&login=${login}&domain=${domain}&id=${id}`);
                    content = data.textBody || data.htmlBody || data.body || "无正文";
                } else if (currentService === "guerrilla" && sid) {
                    const data = await fetchAPI(`https://api.guerrillamail.com/ajax.php?f=fetch_email&email_id=${id}&sid_token=${sid}`);
                    content = data.body || "无正文";
                } else {
                    content = "当前服务暂不支持查看详情";
                }
                alert(`邮件内容：\n\n${content}`);
            } catch(e) {
                alert("查看失败：" + e.message);
            }
        }

        function manualRefresh() {
            const btn = document.querySelector('.refresh-inbox-btn');
            const old = btn.textContent;
            btn.textContent = "🔄 刷新中...";
            refreshInbox().then(() => setTimeout(() => btn.textContent = old, 800));
        }

        function copyMail() {
            if (!currentEmail) return;
            navigator.clipboard.writeText(currentEmail).then(() => {
                const original = addrEl.textContent;
                addrEl.classList.add('copied');
                addrEl.textContent = "✅ 已复制！";
                setTimeout(() => {
                    addrEl.classList.remove('copied');
                    addrEl.textContent = original;
                }, 1500);
            });
        }

        function createPetalRain() {
            const container = document.getElementById('petals');
            const colors = ['#ff9ede', '#c084fc', '#a5b4fc', '#67e8f9', '#bae6fd'];
            setInterval(() => {
                const p = document.createElement('div');
                p.classList.add('petal');
                if (Math.random() > 0.65) p.classList.add('tiny');
                const s = Math.random();
                if (s > 0.7) p.classList.add('slow');
                else if (s > 0.35) p.classList.add('medium');
                else p.classList.add('fast');
                p.style.left = Math.random() * 100 + 'vw';
                p.style.background = `linear-gradient(135deg, ${colors[Math.floor(Math.random()*colors.length)]}, #ffffff33)`;
                p.style.animationDuration = (12 + Math.random() * 15) + 's';
                container.appendChild(p);
                setTimeout(() => p.remove(), 40000);
            }, 180);
        }

        window.addEventListener('DOMContentLoaded', () => {
            createPetalRain();
            generateNewMail();
            setInterval(refreshInbox, 5000);

            const music = document.getElementById('bgm');
            const mBtn = document.getElementById('musicToggle');
            mBtn.onclick = () => {
                if (music.paused) {
                    music.play();
                    mBtn.classList.add('playing');
                } else {
                    music.pause();
                    mBtn.classList.remove('playing');
                }
            };

            document.getElementById('themeToggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
                document.getElementById('themeToggle').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
            });

            setTimeout(() => music.play().catch(() => {}), 2000);
        });
    </script>
</body>
</html>
