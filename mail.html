<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>114.ae跨境 - 临时邮箱 阅后即焚</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #5b6e8c;
            --border-color: #e9eef3;
            --accent-color: #1e3c72;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --marquee-bg: rgba(255, 255, 255, 0.15);
            --result-bg: rgba(30, 60, 114, 0.05);
            --tag-bg: #eef2ff;
        }
        body.dark {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-color: #60a5fa;
            --glass-bg: rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --marquee-bg: rgba(0, 0, 0, 0.3);
            --result-bg: rgba(96, 165, 250, 0.1);
            --tag-bg: #334155;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s;
        }
        .marquee-container {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--marquee-bg); backdrop-filter: blur(12px);
            padding: 8px 0; z-index: 100; border-bottom: 1px solid var(--glass-border);
            overflow: hidden;
        }
        .marquee {
            white-space: nowrap; display: inline-block;
            animation: marquee 22s linear infinite;
        }
        .marquee a {
            color: var(--text-primary); font-weight: bold; text-decoration: none;
            padding: 0 30px; font-size: 15px; display: inline-block;
            background: rgba(255,255,255,0.2); border-radius: 30px; margin: 0 5px;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .container { max-width: 800px; margin: 0 auto; padding: 100px 20px 40px; }
        .search-header {
            background: var(--card-bg); border-radius: 32px;
            padding: 32px 40px; margin-bottom: 24px;
            border: 1px solid var(--border-color); text-align: center;
        }
        .avatar {
            width: 90px; height: 90px; border-radius: 50%;
            margin: 15px auto; border: 4px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            font-size: 3.8rem; display: flex; align-items: center; justify-content: center;
            background: #1e3c72; color: #60a5fa;
        }
        h1 {
            font-size: 2.3rem; font-weight: 700;
            background: linear-gradient(135deg, #00b4ff, #00ff9d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .mail-display {
            background: var(--result-bg); padding: 18px 24px;
            border-radius: 60px; font-family: monospace;
            font-size: 1.15rem; font-weight: 600; margin: 20px 0;
            color: var(--text-primary); border: 2px solid var(--accent-color);
            min-height: 58px; display: flex; align-items: center; justify-content: center;
            word-break: break-all;
        }
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            min-width: 130px; padding: 13px 26px; border-radius: 60px;
            border: none; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-p { background: var(--accent-color); color: white; }
        .btn-s { background: var(--tag-bg); color: var(--text-primary); }
        .btn:active { transform: scale(0.97); }
        .results-container {
            background: var(--card-bg); border-radius: 32px;
            padding: 24px; border: 1px solid var(--border-color);
            min-height: 300px;
        }
        .results-title {
            font-size: 0.9rem; color: var(--text-secondary);
            margin-bottom: 20px; padding-left: 10px;
            border-left: 4px solid var(--accent-color);
        }
        .msg-item {
            background: var(--result-bg); border-radius: 20px;
            padding: 20px; margin-bottom: 16px; border: 1px solid var(--border-color);
            transition: 0.2s; cursor: pointer;
        }
        .msg-item:hover { transform: translateY(-2px); border-color: var(--accent-color); }
        .msg-meta { font-size: 0.75rem; color: var(--accent-color); font-weight: bold; margin-bottom: 5px; }
        .msg-subject { font-weight: 700; font-size: 1.1rem; color: var(--text-primary); }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 200;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 650px; height: 85vh;
            border-radius: 28px; display: flex; flex-direction: column;
            border: 1px solid var(--border-color); overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 20px 25px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body {
            flex: 1; overflow-y: auto; padding: 25px; color: var(--text-primary);
        }
        .close-btn {
            background: var(--tag-bg); color: var(--text-primary);
            border: none; padding: 8px 20px; border-radius: 50px;
            cursor: pointer; font-weight: bold;
        }
        .theme-toggle {
            position: fixed; top: 70px; right: 20px; width: 45px; height: 45px;
            border-radius: 50%; background: var(--card-bg);
            border: 1px solid var(--border-color); display: flex;
            align-items: center; justify-content: center; cursor: pointer; z-index: 101;
        }
        .music-player { position: fixed; bottom: 25px; right: 25px; z-index: 102; }
        .music-toggle {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--card-bg); border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .music-toggle.playing { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .proxy-selector { margin: 15px 0 20px; text-align: center; }
        .proxy-selector select {
            padding: 10px 18px; border-radius: 50px; border: 2px solid var(--accent-color);
            background: var(--card-bg); color: var(--text-primary); font-size: 0.96rem;
        }
        .service-selector { margin: 10px 0 15px; text-align: center; }
        .service-selector select {
            padding: 10px 18px; border-radius: 50px; border: 2px solid var(--accent-color);
            background: var(--card-bg); color: var(--text-primary); font-size: 0.96rem;
        }
        @media (max-width: 640px) {
            .container { padding-top: 80px; }
            .search-header, .results-container { border-radius: 24px; padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee">
            <a href="#" target="_blank">🚀 114.ae跨境临时邮箱 · 隐私保护 · 阅后即焚 · 支持验证码 · 防骚扰</a>
            <a href="#" target="_blank">🚀 114.ae跨境临时邮箱 · 隐私保护 · 阅后即焚 · 支持验证码 · 防骚扰</a>
        </div>
    </div>

    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="container">
        <div class="search-header">
            <div class="avatar">🛸</div>
            <h1>114.ae跨境</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">114.ae临时邮箱 阅后即焚</p>

            <!-- 服务选择（vmail.dev 主 + 稳定补充） -->
            <div class="service-selector">
                <select id="serviceSelect" onchange="changeService()">
                    <option value="vmail">vmail.dev（主推荐，可靠接收）</option>
                    <option value="guerrilla">Guerrilla Mail（老牌稳定）</option>
                    <option value="1secmail">1SecMail（快速接收）</option>
                </select>
            </div>

            <!-- 跨域代理选择 -->
            <div class="proxy-selector">
                <select id="proxySelect" onchange="changeProxy()">
                    <option value="https://proxy.api.030101.xyz/https://vmail.dev/api/v1">专用代理（推荐）</option>
                    <option value="https://corsproxy.io/?https://vmail.dev/api/v1">通用CORS代理</option>
                </select>
            </div>

            <div id="addr" class="mail-display">正在自动生成邮箱...</div>
            <div class="btn-group">
                <button onclick="copyMail()" class="btn btn-s">📋 复制地址</button>
                <button id="refreshBtn" onclick="init()" class="btn btn-p">🔄 更换地址</button>
            </div>
        </div>

        <div class="results-container">
            <div class="results-title">📥 实时收件箱 (仅存留于当前页面)</div>
            <div id="list">
                <div style="text-align: center; padding: 60px; color: var(--text-secondary);">正在等待新邮件推送...</div>
            </div>
        </div>
    </div>

    <!-- 邮件详情弹窗 -->
    <div id="mailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalSubject" style="font-weight: bold; font-size: 1.1rem;">邮件详情</span>
                <button class="close-btn" onclick="closeMail()">关闭</button>
            </div>
            <div id="modalBody" class="modal-body">加载详情中...</div>
        </div>
    </div>

    <div class="music-player">
        <div class="music-toggle" id="musicToggle">💿</div>
    </div>
    <audio id="bgm" loop preload="auto" src="https://files.catbox.moe/0oluxu.flac"></audio>

    <footer style="text-align:center; padding:40px 20px; color:var(--text-secondary); font-size:0.9rem; margin-top:50px;">
        © 114.ae跨境临时邮箱 | TG: @your_tg | WhatsApp: +65 你的号码<br>
        隐私保护 · 阅后即焚 · 本站不永久存储任何邮件
    </footer>

    <script>
        // 当前服务和代理
        let currentService = "vmail";
        let currentProxyBase = "https://proxy.api.030101.xyz/https://vmail.dev/api/v1";
        const API_KEY = 'vmail_at6AmSu4dEkuJG4bafc8qhSqBctCMW9q';
        let mid = null;
        let isInitializing = false;
        let currentEmail = "";

        const addrEl = document.getElementById('addr');
        const listEl = document.getElementById('list');

        function changeService() {
            currentService = document.getElementById('serviceSelect').value;
            init();
        }

        function changeProxy() {
            const val = document.getElementById('proxySelect').value;
            currentProxyBase = val;
            init();
        }

        document.getElementById('themeToggle').onclick = function() {
            document.body.classList.toggle('dark');
            this.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        };

        const music = document.getElementById('bgm');
        const mBtn = document.getElementById('musicToggle');
        mBtn.onclick = (e) => {
            e.stopPropagation();
            if(music.paused) { music.play(); mBtn.classList.add('playing'); }
            else { music.pause(); mBtn.classList.remove('playing'); }
        };

        function autoPlayMusic() {
            music.play().then(() => mBtn.classList.add('playing')).catch(() => {});
        }

        async function init(retries = 3) {
            if (isInitializing && retries === 3) return;
            isInitializing = true;
            const btn = document.getElementById('refreshBtn');
            addrEl.innerText = "⚡ 正在生成随机邮箱...";
            btn.disabled = true;

            try {
                let url = currentProxyBase;
                if (currentService === "guerrilla") {
                    // Guerrilla Mail 逻辑（核心不改）
                    const data = await (await fetch(currentProxyBase.replace('/https://vmail.dev/api/v1', '') + 'https://api.guerrillamail.com/ajax.php?f=get_email_address')).json();
                    currentEmail = data.email_addr;
                    mid = null; // Guerrilla 使用 sid
                    addrEl.innerText = currentEmail;
                } else if (currentService === "1secmail") {
                    const data = await (await fetch('https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1')).json();
                    currentEmail = data[0];
                    mid = null;
                    addrEl.innerText = currentEmail;
                } else {
                    // vmail.dev 主服务（你的核心）
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    const r = await fetch(url + '/mailboxes', {
                        method: 'POST',
                        headers: {'X-API-Key': API_KEY, 'Content-Type': 'application/json'},
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    if (!r.ok) throw new Error('Proxy API Error');
                    const {data} = await r.json();
                    mid = data.id;
                    currentEmail = data.address;
                    addrEl.innerText = currentEmail;
                }
                listEl.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text-secondary);">🚀 邮箱已就绪，正在监听新邮件...</div>';
            } catch(e) {
                if (retries > 0) {
                    setTimeout(() => init(retries - 1), 1000);
                } else {
                    addrEl.innerText = "⚠️ 生成失败，请切换代理或点击更换地址重试";
                }
            } finally {
                isInitializing = false;
                btn.disabled = false;
            }
        }

        async function refresh() {
            if (!mid && currentService !== "guerrilla" && currentService !== "1secmail") return;
            try {
                let data = [];
                if (currentService === "vmail" && mid) {
                    const r = await fetch(currentProxyBase + `/mailboxes/${mid}/messages`, {headers:{'X-API-Key':API_KEY}});
                    const res = await r.json();
                    data = res.data || [];
                } else if (currentService === "guerrilla") {
                    // Guerrilla 简单实现（可扩展）
                    data = [];
                } else if (currentService === "1secmail") {
                    const login = currentEmail.split('@')[0];
                    const domain = currentEmail.split('@')[1];
                    const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`);
                    data = await res.json() || [];
                }
                const box = document.getElementById('list');
                if (data.length === 0) {
                    box.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text-secondary);">暂无新邮件...</div>';
                    return;
                }
                box.innerHTML = data.map(m => `
                    <div class="msg-item" onclick="viewMail('${m.id || m.mail_id}', '${m.subject || '无主题'}')">
                        <div class="msg-meta">来自: ${m.from ? (m.from.address || m.from) : '未知'} | ${new Date(m.receivedAt || m.date).toLocaleTimeString()}</div>
                        <div class="msg-subject">${m.subject || '（无主题）'}</div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        async function viewMail(msgId, subject) {
            const modal = document.getElementById('mailModal');
            const mBody = document.getElementById('modalBody');
            const mSub = document.getElementById('modalSubject');
            mSub.innerText = subject;
            mBody.innerHTML = '加载详情中...';
            modal.style.display = 'flex';
            try {
                if (currentService === "vmail" && mid) {
                    const r = await fetch(currentProxyBase + `/mailboxes/${mid}/messages/${msgId}`, {headers:{'X-API-Key':API_KEY}});
                    const {data} = await r.json();
                    mBody.innerHTML = data.html || `<pre>${data.text || '无正文'}</pre>`;
                } else {
                    mBody.innerHTML = '当前服务详情查看暂不支持';
                }
            } catch(e) {
                mBody.innerHTML = '加载失败，请稍后重试';
            }
        }

        function closeMail() {
            document.getElementById('mailModal').style.display = 'none';
        }

        function copyMail() {
            const val = document.getElementById('addr').innerText;
            if (val.includes('@')) {
                navigator.clipboard.writeText(val);
                alert('复制成功！注意：刷新页面后该地址将永久失效');
            } else {
                alert('地址尚未准备好，请稍等或重试');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            init();  // 自动生成
            setInterval(refresh, 5000);
            autoPlayMusic();
            document.addEventListener('click', autoPlayMusic, {once: true});
        });
    </script>
</body>
</html>
