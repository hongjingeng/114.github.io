<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>114.ae域名查询</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f7fb; margin:0; padding:0; text-align:center; transition: background 0.3s, color 0.3s; }
body.dark { background:#1e1e1e; color:#f5f5f5; }
.container { max-width: 900px; margin:50px auto; padding:20px; background:#fff; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.1); transition: background 0.3s, color 0.3s; }
body.dark .container { background:#2c2c2c; color:#f5f5f5; }
h1 { margin-bottom:20px; }
input { width:60%; padding:12px; font-size:16px; border-radius:6px; border:1px solid #ddd; margin-right:10px; }
button { padding:12px 18px; font-size:16px; border:none; border-radius:6px; background:#007bff; color:#fff; cursor:pointer; margin:2px; }
button:hover { background:#0056b3; }
#output { margin-top:20px; text-align:center; overflow-x:auto; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:10px; border:1px solid #ddd; }
.available { color:red; font-weight:bold; }
.not-available { color:green; font-weight:bold; }
.loading { font-weight:bold; margin-top:10px; }
.lang-btn { cursor:pointer; margin:0 5px; padding:5px 10px; border-radius:4px; border:1px solid #ccc; }
.lang-btn.active { background:#007bff; color:#fff; border-color:#007bff; }
#marquee { font-size:16px; margin-bottom:10px; }
#copyright { margin-top:20px; font-size:24px; color:#888; }
@media(max-width:600px){ input { width:80%; } table { font-size:14px; } }
</style>
</head>
<body>
<div class="container">
  <div id="marquee"><marquee>当前要出售的域名 →→→ uda.ae →→→ wemart.ae →→→ alipay.ae 需要买的带价格来谈 联系微信: jingeng</marquee></div>
  <h1 id="title">114.ae域名查询</h1>
  <div>
    <input type="text" id="domain" placeholder="输入域名(不带后缀)">
    <button onclick="checkDomains()">查询</button>
    <button id="themeBtn" onclick="toggleTheme()">切换暗黑/亮色</button>
  </div>
  <div style="margin-top:10px;">
    <span class="lang-btn active" onclick="switchLang('zh', this)">中文</span>
    <span class="lang-btn" onclick="switchLang('en', this)">English</span>
    <span class="lang-btn" onclick="switchLang('ar', this)">عربي</span>
  </div>
  <div id="deviceInfo" style="margin-top:10px; font-weight:bold;"></div>
  <div id="output"></div>
  <div style="margin-top:10px;">
    <button onclick="copyResults()">复制结果</button>
    <button onclick="shareResults()">转发结果</button>
  </div>
  <div style="margin-top:10px;">
    <button onclick="chatTG()">TG 聊天</button>
    <button onclick="chatWA()">WhatsApp 聊天</button>
  </div>
  <div id="copyright">
    &copy; 2026 www.114.ae 广告 微信👉 jingeng保留所有权利
  </div>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

const translations = {
  zh: { title:"114.ae域名查询", checking:"查询中...", copy:"复制成功", alertNoDomain:"请输入域名", fetchError:"查询失败，请稍后再试" },
  en: { title:"114.ae Domain Search", checking:"Checking...", copy:"Copied", alertNoDomain:"Please enter domain", fetchError:"Failed to fetch, try later" },
  ar: { title:"114.ae بحث عن النطاق", checking:"جاري الفحص...", copy:"تم النسخ", alertNoDomain:"يرجى إدخال النطاق", fetchError:"فشل الفحص، حاول لاحقًا" }
};

let currentLang = "zh";

function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark")?"dark":"light");
}
if(localStorage.getItem("theme")==="dark") document.body.classList.add("dark");

function switchLang(lang, el){
  currentLang = lang;
  document.getElementById("title").innerText = translations[lang].title;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function detectDevice(){
  let ua = navigator.userAgent;
  let device = /Mobi|Android/i.test(ua) ? "移动设备" : "PC";
  document.getElementById("deviceInfo").innerText = "当前访问设备：" + device;
}
detectDevice();

async function checkDomains(){
  const domainInput = document.getElementById("domain").value.trim();
  const tlds = [".ae",".ac.ae",".org.ae",".sch.ae",".co.ae"];
  if(!domainInput){ alert(translations[currentLang].alertNoDomain); return; }
  
  const output = document.getElementById("output");
  output.innerHTML = "<div class='loading'>"+translations[currentLang].checking+"</div>";

  try{
    // ✅ 严格使用相对路径 /api/domain-check，不加任何 https 网址
    const res = await fetch("/api/domain-check", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({domains:[domainInput], tlds})
    });
    const data = await res.json();
    
    if(data.error){ output.innerHTML = data.error; return; }
    
    let html = "<table><tr><th>域名</th><th>状态</th><th>注册/续费价格(AED)</th></tr>";
    for(let d of data){
      let statusText = d.isAvailable ? "未注册，联系微信注册：jingeng" : "已注册";
      html += `<tr><td>${d.domain}</td><td class="${d.isAvailable?'not-available':'available'}">${statusText}</td><td>${d.regPrice} / ${d.renewPrice}</td></tr>`;
    }
    html += "</table>";
    output.innerHTML = html;
  }catch(e){ 
    console.error(e); 
    output.innerHTML = translations[currentLang].fetchError; 
  }
}

function copyResults(){ 
  navigator.clipboard.writeText(document.getElementById("output").innerText).then(()=>alert(translations[currentLang].copy)); 
}

function shareResults(){ 
  navigator.share?navigator.share({title:"域名查询结果",text:document.getElementById("output").innerText}).catch(e=>console.error(e)):alert("当前浏览器不支持分享，请手动复制结果"); 
}

function chatTG(){ window.open("https://t.me/at114ae","_blank"); }
function chatWA(){ window.open("https://api.whatsapp.com/message/VBL34SHP73GYH1","_blank"); }

window.addEventListener("DOMContentLoaded",()=>{
  // 页面加载完成
});
</script>
</body>
</html>
