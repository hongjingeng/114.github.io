<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>114.ae Barcode & QR Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>

<style>
:root {
    --primary:#0056b3;
    --success:#198754;
    --danger:#dc3545;
    --bg:#e9ecef;
    --card:#ffffff;
}

body {
    margin:0;
    font-family:"Segoe UI","Microsoft YaHei",sans-serif;
    background:var(--bg);
}

.container { max-width:1400px; margin:auto; padding:15px; }

header {
    background:linear-gradient(135deg,#343a40,#495057);
    color:#fff;
    padding:15px 20px;
    border-radius:8px 8px 0 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.main-layout { display:grid; grid-template-columns:280px 1fr; gap:15px; margin-top:15px; }
@media(max-width:900px){ .main-layout{grid-template-columns:1fr;} }

.sidebar {
    background:var(--card);
    border-radius:8px;
    padding:10px;
}
.sidebar button {
    width:100%;
    padding:15px;
    margin-bottom:8px;
    border:1px solid #adb5bd;
    background:#f8f9fa;
    font-size:16px;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
}
.sidebar button.active {
    background:var(--primary);
    color:#fff;
    border-color:var(--primary);
}

.content-area {
    background:var(--card);
    border-radius:8px;
    padding:20px;
}

.tab-content { display:none; }
.tab-content.active { display:block; }

.form-group { margin-bottom:15px; }
.form-group label { font-weight:bold; display:block; margin-bottom:8px; }
.form-group input, .form-group textarea, .form-group select {
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #adb5bd;
    border-radius:4px;
}

.btn {
    padding:12px 20px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:4px;
    cursor:pointer;
    margin-right:10px;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }

.result-section {
    margin-top:20px;
    border-top:2px dashed #adb5bd;
    padding-top:20px;
    text-align:center;
}

/* ===== 全屏 PDA 扫码 ===== */
#scanner-fullscreen {
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;
    display:none;
    flex-direction:column;
}
#scanner-fullscreen.active { display:flex; }

#fs-video {
    flex:1;
    object-fit:cover;
}

#fs-result {
    height:80px;
    background:#111;
    color:#0f0;
    font-size:22px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
}

#fs-close {
    position:absolute;
    top:15px;
    right:15px;
    background:rgba(0,0,0,0.6);
    color:#fff;
    border:none;
    font-size:26px;
    width:50px;
    height:50px;
    border-radius:50%;
}

footer {
    text-align:center;
    margin-top:30px;
    color:#6c757d;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
    <header>
        <h1>114.ae 条码/二维码工具</h1>
        <span>工业 PDA / 离线工具</span>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <button class="nav-btn active" data-tab="generator">1. 统一生成器</button>
            <button class="nav-btn" data-tab="scanner">2. 扫码（全屏）</button>
            <button class="nav-btn" data-tab="batch-gen">3. 批量生成</button>
            <button class="nav-btn" data-tab="batch-decode">4. 批量解码</button>
            <button class="nav-btn" data-tab="print-mode">5. 打印标签</button>
        </aside>

        <main class="content-area">

            <!-- Generator -->
            <div id="generator" class="tab-content active">
                <h3>统一生成器</h3>
                <div class="form-group">
                    <label>码制</label>
                    <select id="gen-type">
                        <option value="qrcode">QR Code</option>
                        <option value="code128">CODE-128</option>
                        <option value="ean13">EAN-13</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <textarea id="gen-content"></textarea>
                </div>
                <button class="btn btn-primary" onclick="generateSingle()">生成</button>
                <button class="btn btn-success" onclick="generateRandom()">随机</button>
                <div id="gen-output" class="result-section"></div>
            </div>

            <!-- Scanner Trigger -->
            <div id="scanner" class="tab-content">
                <h3>扫码器</h3>
                <p>点击下方按钮进入全屏扫码模式</p>
                <button class="btn btn-primary" onclick="openFullScreenScanner()">打开全屏扫码</button>
            </div>

            <!-- Batch Generate -->
            <div id="batch-gen" class="tab-content">
                <h3>批量生成</h3>
                <input id="batch-start" placeholder="起始值 如 ABC001">
                <input id="batch-count" type="number" value="10">
                <button class="btn btn-primary" onclick="batchGenerate()">生成</button>
                <div id="batch-output" class="result-section"></div>
            </div>

            <!-- Batch Decode -->
            <div id="batch-decode" class="tab-content">
                <h3>批量解码</h3>
                <input type="file" multiple onchange="batchDecode(this.files)">
                <div id="batch-decode-result" class="result-section"></div>
            </div>

            <!-- Print -->
            <div id="print-mode" class="tab-content">
                <h3>打印标签</h3>
                <input id="label-content" value="TEST-001">
                <button class="btn btn-primary" onclick="renderLabel()">预览</button>
                <button class="btn btn-success" onclick="window.print()">打印</button>
                <div id="label-box" class="result-section"></div>
            </div>

        </main>
    </div>

    <footer>114.ae Barcode & QR Tool | Single HTML File</footer>
</div>

<!-- ===== 全屏扫码层 ===== -->
<div id="scanner-fullscreen">
    <button id="fs-close" onclick="closeFullScreenScanner()">×</button>
    <video id="fs-video"></video>
    <div id="fs-result">请对准条码</div>
</div>

<script>
/* Navigation */
document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
    };
});

let fsScannerActive=false;

/* ===== 全屏扫码 ===== */
function openFullScreenScanner(){
    const fs=document.getElementById('scanner-fullscreen');
    fs.classList.add('active');
    startFsScanner();
}

function closeFullScreenScanner(){
    Quagga.stop();
    const v=document.getElementById('fs-video');
    if(v.srcObject) v.srcObject.getTracks().forEach(t=>t.stop());
    document.getElementById('scanner-fullscreen').classList.remove('active');
    fsScannerActive=false;
}

function startFsScanner(){
    if(fsScannerActive) return;
    fsScannerActive=true;

    Quagga.init({
        inputStream:{
            name:"Live",
            type:"LiveStream",
            target:document.getElementById('fs-video'),
            constraints:{facingMode:"environment"}
        },
        decoder:{readers:["code_128_reader","ean_reader","qr_code_reader","datamatrix_reader"]},
        locate:true
    },err=>{
        if(err) return alert("相机启动失败");
        Quagga.start();
    });

    Quagga.onDetected(r=>{
        const code=r.codeResult.code;
        document.getElementById('fs-result').innerText="✅ "+code;
        navigator.vibrate?.(200);
    });
}

/* ===== 生成 ===== */
function generateSingle(){
    const box=document.getElementById('gen-output');
    box.innerHTML='';
    const type=document.getElementById('gen-type').value;
    const text=document.getElementById('gen-content').value;
    if(type==='qrcode') new QRCode(box,{text,width:300,height:300});
    else JsBarcode(box,text,{format:type.toUpperCase(),width:2,height:100});
}

function generateRandom(){
    document.getElementById('gen-content').value='SN'+Math.floor(Math.random()*1e6);
    generateSingle();
}

/* ===== 批量生成 ===== */
function batchGenerate(){
    const out=document.getElementById('batch-output');
    out.innerHTML='';
    let start=document.getElementById('batch-start').value;
    const count=+document.getElementById('batch-count').value;
    const m=start.match(/^(.*?)(\d+)$/);
    let pre='',num=0,len=0;
    if(m){pre=m[1];num=+m[2];len=m[2].length;}
    for(let i=0;i<count;i++){
        const val=pre+(num+i).toString().padStart(len,'0');
        const d=document.createElement('div');
        d.innerHTML=`<b>${val}</b>`;
        JsBarcode(d,val,{format:'CODE128',width:2,height:80});
        out.appendChild(d);
    }
}

/* ===== 批量解码 ===== */
function batchDecode(files){
    const out=document.getElementById('batch-decode-result');
    out.innerHTML='';
    [...files].forEach(f=>{
        const fr=new FileReader();
        fr.onload=e=>{
            Quagga.decodeSingle({
                src:e.target.result,
                numOfWorkers:0,
                decoder:{readers:["code_128_reader","ean_reader","qr_code_reader"]}
            },r=>{
                const div=document.createElement('div');
                div.innerText=f.name+' → '+ (r?.codeResult?.code||'未识别');
                out.appendChild(div);
            });
        };
        fr.readAsDataURL(f);
    });
}

/* ===== 打印 ===== */
function renderLabel(){
    const box=document.getElementById('label-box');
    box.innerHTML='';
    JsBarcode(box,document.getElementById('label-content').value,{
        format:'CODE128',
        width:2,
        height:100,
        displayValue:true
    });
}
</script>
</body>
</html>
