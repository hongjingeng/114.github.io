<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>114.ae 跨境服务 | 香港保险 · 代理工具 · 海外业务一站式</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- 跑马灯 -->
    <div class="marquee-container">
        <div class="marquee">
            <a href="https://www.114.ae" target="_blank">🚀 www.114.ae 跨境工具箱 · 广告 👉 微信 jingeng</a>
        </div>
    </div>

    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="container">
        <div class="tab-bar" id="tabBar"></div>
        <div id="ad-1200x70" class="ad-banner"></div>
        <div id="text-ads" style="margin:20px 0;text-align:center;"></div>
        <div id="contentContainer"></div>
    </div>

    <!-- 邮件弹窗（默认隐藏） -->
    <div id="mailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalSubject" style="font-weight:bold;">邮件详情</span>
                <button class="close-btn" onclick="closeMail()">关闭</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button onclick="copyEmailContent()" class="btn btn-s">📋 复制全文</button>
            </div>
        </div>
    </div>

    <footer style="text-align:center;padding:40px 20px;color:var(--text-secondary);font-size:0.9rem;margin-top:50px;">
        © 2026 114.ae | 服务海外华人 · 广告 👉 微信：jingeng
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
