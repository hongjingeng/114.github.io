<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>全网盘搜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #5b6e8c;
            --border-color: #e9eef3;
            --accent-color: #1e3c72;
            --accent-hover: #0f2b4f;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --marquee-bg: rgba(255, 255, 255, 0.15);
            --result-bg: rgba(30, 60, 114, 0.05);
            --input-bg: rgba(255, 255, 255, 0.4);
            --tag-bg: #eef2ff;
            --password-tag: #fef3c7;
        }

        body.dark {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-color: #60a5fa;
            --accent-hover: #3b82f6;
            --glass-bg: rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --marquee-bg: rgba(0, 0, 0, 0.3);
            --result-bg: rgba(96, 165, 250, 0.1);
            --input-bg: rgba(30, 41, 59, 0.6);
            --tag-bg: #334155;
            --password-tag: #451a03;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .marquee-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--marquee-bg);
            backdrop-filter: blur(12px);
            padding: 8px 0;
            z-index: 100;
            overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
        }

        .marquee {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 22s linear infinite;
            padding-left: 100%;
        }

        .marquee a {
            color: var(--text-primary);
            font-weight: bold;
            text-decoration: none;
            padding: 0 30px;
            font-size: 15px;
            display: inline-block;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            margin: 0 5px;
            transition: background 0.2s;
        }

        .marquee a:hover {
            background: rgba(74,108,247,0.3);
            text-decoration: underline;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 80px;
        }

        .search-header {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px 40px;
            margin-bottom: 32px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #4a6cf7, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin: 15px 0 20px 0;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .avatar:hover {
            transform: scale(1.05);
            border-color: var(--accent-color);
        }

        .sub {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 1rem;
        }

        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex: 1;
            min-width: 300px;
            padding: 16px 24px;
            font-size: 1.1rem;
            border: 1px solid var(--border-color);
            border-radius: 60px;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        .search-btn {
            min-width: 140px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0 32px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-btn:hover {
            background: var(--accent-hover);
            transform: scale(0.98);
        }

        .stats {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: var(--result-bg);
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.2);
        }

        .card-content {
            padding: 20px 24px;
        }

        .resource-title {
            font-weight: 700;
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 0.75rem;
        }

        .badge {
            background: var(--tag-bg);
            padding: 4px 12px;
            border-radius: 40px;
            color: var(--text-primary);
        }

        .password-badge {
            background: var(--password-tag);
            color: #b45309;
        }

        .note {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 12px 0;
            background: var(--result-bg);
            padding: 10px 12px;
            border-radius: 16px;
            word-break: break-word;
        }

        .link-btn {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            transition: 0.2s;
        }

        .link-btn:hover {
            background: var(--accent-hover);
        }

        .footer-info {
            border-top: 1px solid var(--border-color);
            background: var(--card-bg);
            padding: 12px 20px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
        }

        .empty-state, .error-state {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 60px 24px;
            text-align: center;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            font-size: 1rem;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1rem;
            color: var(--accent-color);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 102;
        }

        .music-toggle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
        }

        .music-toggle.playing {
            animation: rotate 4s linear infinite;
            background: rgba(96, 165, 250, 0.3);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-hint {
            position: fixed;
            bottom: 80px;
            right: 25px;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            pointer-events: none;
            z-index: 102;
        }

        @media (max-width: 640px) {
            .container { padding: 16px; padding-top: 80px; }
            .search-header { padding: 24px 20px; }
            h1 { font-size: 1.6rem; }
            .search-input { min-width: 100%; font-size: 1rem; padding: 14px 20px; }
            .search-btn { min-width: 100%; padding: 14px 20px; }
            .results-grid { grid-template-columns: 1fr; gap: 16px; }
            .theme-toggle { top: 70px; right: 15px; width: 40px; height: 40px; font-size: 20px; }
            .avatar { width: 65px; height: 65px; }
        }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee">
            <a href="https://kelayun.notepin.co" target="_blank" rel="noopener noreferrer">

            <a href="https://kelayun.notepin.co" target="_blank" rel="noopener noreferrer">

            </a>
        </div>
    </div>

    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="container">
        <div class="search-header">
            <h1>全网盘搜</h1>
            <div class="avatar-wrapper">
                <img src="https://mpimg.cn/view.php/f28da3eac8f392e9fa2ba91723b2bf4c.png" 
                     alt="头像" 
                     class="avatar"
                     onerror="this.onerror=null; this.src='https://via.placeholder.com/80x80?text=Avatar'">
            </div>
            <div class="sub">🚀 代理加速 · 智能缓存 · 瞬时响应</div>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="输入电影、剧集、短剧、书籍、音乐、软件、资料">
                <button id="searchBtn" class="search-btn">🔍 极速搜索</button>
            </div>
            <div id="statsArea" class="stats">✨ 代理加速已启用 · 点击按钮开始搜索</div>
        </div>

        <div id="resultsContainer" class="results-grid">
            <div class="empty-state">
                🚀 代理加速版搜索站已就绪<br>
                ✅ 跨域代理已启用 · 请求速度提升<br>
                💡 试试搜索「死神来了」「短剧」「蜜语纪」等关键词
            </div>
        </div>
    </div>

    <div class="music-hint" id="musicHint">🎵 自动播放</div>
    <div class="music-player">
        <div class="music-toggle" id="musicToggle">💿</div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://mpimg.cn/view.php/93e1ad1d1ff45f0cc3f3d6dedcd6ba3c.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            const ORIGIN_API = 'https://so.252035.xyz/api/search?kw=';
            const PROXY_API = 'https://proxy.api.030101.xyz/';
            const USE_PROXY = true;

            function buildApiUrl(keyword) {
                const encodedKw = encodeURIComponent(keyword);
                if (USE_PROXY) {
                    return PROXY_API + ORIGIN_API + encodedKw;
                }
                return ORIGIN_API + encodedKw;
            }

            const cache = new Map();

            async function fetchWithTimeout(url, timeout = 8000, retries = 1) {
                for (let i = 0; i <= retries; i++) {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), timeout);
                        const response = await fetch(url, { 
                            signal: controller.signal, 
                            headers: { 'Accept': 'application/json' }
                        });
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return await response.json();
                    } catch (err) {
                        if (i === retries) throw err;
                        await new Promise(r => setTimeout(r, 500));
                    }
                }
            }

            function formatDate(dateStr) {
                if (!dateStr || dateStr.startsWith('0001-01-01')) return '时间未知';
                try {
                    const date = new Date(dateStr);
                    if (isNaN(date.getTime())) return dateStr.split('T')[0];
                    return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
                } catch(e) {
                    return dateStr;
                }
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function getDiskType(url) {
                if (url.includes('pan.baidu.com')) return '📀 百度网盘';
                if (url.includes('aliyundrive.com')) return '☁️ 阿里云盘';
                if (url.includes('quark.cn')) return '⚛️ 夸克网盘';
                if (url.includes('xunlei.com')) return '⚡ 迅雷网盘';
                return '🔗 网盘链接';
            }

            function renderCard(item) {
                const title = item.note || '无标题资源';
                const url = item.url || '#';
                const password = item.password || '';
                const source = item.source || '未知来源';
                const datetime = item.datetime ? formatDate(item.datetime) : '时间未知';
                const noteDetail = item.note || '';
                const diskType = getDiskType(url);
                
                return `
                    <div class="card">
                        <div class="card-content">
                            <div class="resource-title">${escapeHtml(title)}</div>
                            <div class="meta-info">
                                <span class="badge">${diskType}</span>
                                <span class="badge">📅 ${datetime}</span>
                                <span class="badge">📡 ${escapeHtml(source)}</span>
                                ${password ? `<span class="badge password-badge">🔑 提取码: ${escapeHtml(password)}</span>` : ''}
                            </div>
                            ${noteDetail && noteDetail !== title ? `<div class="note">📄 ${escapeHtml(noteDetail.substring(0, 180))}${noteDetail.length > 180 ? '…' : ''}</div>` : ''}
                            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="link-btn">📂 打开资源链接 →</a>
                        </div>
                        <div class="footer-info">
                            <span>✨ 来源: ${escapeHtml(source)}</span>
                            ${password ? `<span>🔐 密码: ${escapeHtml(password)}</span>` : '<span>🔓 无密码</span>'}
                        </div>
                    </div>
                `;
            }

            function showLoading() {
                resultsContainer.innerHTML = `<div class="loading"><div class="spinner"></div><div style="margin-top:12px;">🚀 代理加速请求中...</div></div>`;
            }

            function showError(msg) {
                resultsContainer.innerHTML = `<div class="error-state">⚠️ 请求失败: ${escapeHtml(msg)}<br><br>💡 提示: 代理服务器可能繁忙，请重试或检查网络</div>`;
                statsArea.innerText = `❌ 请求失败: ${msg}`;
            }

            function showEmpty(keyword) {
                resultsContainer.innerHTML = `<div class="empty-state">😞 未找到关于 “${escapeHtml(keyword)}” 的资源<br>试试其他关键词 (例如: 蜜语纪、短剧、死神来了)</div>`;
                statsArea.innerText = `🔍 没有找到与 “${keyword}” 相关的结果`;
            }

            function renderResults(allResults, total, kw) {
                resultsContainer.innerHTML = '';
                for (let i = 0; i < allResults.length; i++) {
                    resultsContainer.insertAdjacentHTML('beforeend', renderCard(allResults[i]));
                }
                if (allResults.length > 30) {
                    const tip = document.createElement('div');
                    tip.className = 'stats';
                    tip.style.marginTop = '16px';
                    tip.style.textAlign = 'center';
                    tip.innerText = `✨ 共 ${allResults.length} 条结果，已全部展示`;
                    resultsContainer.appendChild(tip);
                }
            }

            async function searchResources(keyword) {
                if (!keyword || keyword.trim() === '') {
                    statsArea.innerText = '⚠️ 请输入搜索关键词';
                    resultsContainer.innerHTML = `<div class="empty-state">📌 请输入电影/剧集/资源名称</div>`;
                    return;
                }
                const kw = keyword.trim();
                
                if (cache.has(kw)) {
                    const cached = cache.get(kw);
                    statsArea.innerHTML = `⚡ 缓存命中 · 瞬间展示 ${cached.total} 条结果 · 代理加速版`;
                    renderResults(cached.allResults, cached.total, kw);
                    return;
                }
                
                statsArea.innerText = `🚀 代理加速请求中 · 关键词: ${kw}`;
                showLoading();
                
                try {
                    const apiUrl = buildApiUrl(kw);
                    const data = await fetchWithTimeout(apiUrl, 8000, 1);
                    
                    if (data.code !== 0 || !data.data) {
                        throw new Error(data.message || '接口返回数据异常');
                    }
                    
                    const mergedByType = data.data.merged_by_type || {};
                    let allResults = [];
                    for (let type in mergedByType) {
                        if (Array.isArray(mergedByType[type])) {
                            allResults = allResults.concat(mergedByType[type]);
                        }
                    }
                    
                    if (allResults.length === 0) {
                        showEmpty(kw);
                        return;
                    }
                    
                    const total = data.data.total || allResults.length;
                    cache.set(kw, { allResults, total });
                    if (cache.size > 50) {
                        const firstKey = cache.keys().next().value;
                        cache.delete(firstKey);
                    }
                    
                    statsArea.innerHTML = `✅ 找到 ${total} 条资源 · 代理加速 (已缓存，下次秒开)`;
                    renderResults(allResults, total, kw);
                    
                } catch (err) {
                    console.error('搜索出错:', err);
                    if (err.name === 'AbortError') {
                        showError('请求超时 (8秒)，代理服务器响应较慢，请重试');
                    } else {
                        showError(err.message || '网络错误或代理不可用');
                    }
                }
            }

            function preloadHotKeywords() {
                const hotWords = ['短剧', '电影', '死神来了', '电视剧', '4K'];
                if ('requestIdleCallback' in window) {
                    requestIdleCallback(() => {
                        hotWords.forEach(kw => {
                            if (!cache.has(kw)) {
                                fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(() => {});
                            }
                        });
                    });
                } else {
                    setTimeout(() => {
                        hotWords.forEach(kw => {
                            if (!cache.has(kw)) {
                                fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(() => {});
                            }
                        });
                    }, 2000);
                }
            }

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            const statsArea = document.getElementById('statsArea');

            searchBtn.addEventListener('click', () => {
                searchResources(searchInput.value);
            });
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    searchResources(searchInput.value);
                }
            });

            const music = document.getElementById('bgMusic');
            const musicToggle = document.getElementById('musicToggle');
            const musicHint = document.getElementById('musicHint');

            function attemptAutoPlay() {
                music.play().then(() => {
                    musicToggle.classList.add('playing');
                    musicHint.textContent = '🎵 音乐播放中';
                }).catch(() => {
                    musicHint.textContent = '🎵 点击唱片播放';
                });
            }
            attemptAutoPlay();

            const enableMusicOnFirstInteraction = () => {
                if (music.paused) {
                    music.play().then(() => {
                        musicToggle.classList.add('playing');
                        musicHint.textContent = '🎵 音乐播放中';
                    }).catch(e => console.warn("play failed:", e));
                }
                document.removeEventListener('click', enableMusicOnFirstInteraction);
                document.removeEventListener('touchstart', enableMusicOnFirstInteraction);
            };

            if (music.paused) {
                document.addEventListener('click', enableMusicOnFirstInteraction, { once: true });
                document.addEventListener('touchstart', enableMusicOnFirstInteraction, { once: true });
            }

            musicToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                if (music.paused) {
                    music.play().then(() => {
                        musicToggle.classList.add('playing');
                        musicHint.textContent = '🎵 音乐播放中';
                    }).catch(() => alert("无法播放音频"));
                } else {
                    music.pause();
                    musicToggle.classList.remove('playing');
                    musicHint.textContent = '🎵 已暂停';
                }
            });

            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️';
            }

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
            });

            window.addEventListener('load', () => {
                preloadHotKeywords();
                if (localStorage.getItem('theme') === 'dark') {
                    document.body.classList.add('dark');
                    themeToggle.textContent = '☀️';
                }
            });
        })();
    </script>
</body>
</html>
